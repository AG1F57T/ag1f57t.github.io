<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wojciech Kucharczyk (57780) - PTW LAB C</title>

    <link rel="stylesheet" href="styles.css" type="text/css">
    <script src="scripts.js" defer></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

</head>
<body>
<!-- lokalizacja -->
<button id="btn-location">Share my location</button>
<p id="coords-display">Press for coords...</p>
<button id="btn-new" style="display:none;">Go to location</button>

<!-- powiadomienia -->
<button id="btn-notifications">allow notifications</button>
<p id="notif-status">Notification Status: waiting...</p>

<!-- mapa -->
<div id="map" style="width: 500px; height: 500px; margin-top: 20px;"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- tworzenie zdjecia z mapy -->
<button id="btn-pobierz">Download map and create puzzle</button>
<div style="border: 2px solid #333; padding: 10px; margin-top: 20px; display: flex; flex-direction: row; gap: 10px;">
    <div>
        <p>puzzle rozrzucone</p>
        <div id="puzzle-container"></div>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    </div>
    <div>
        <!-- ulozone puzzle -->
        <p>puzzle poukladane</p>
        <div id="puzzle-container-2"></div>
    </div>
</div>
</body>
</html>
